<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Arturo Solo LLC - I build and ship working AI into small businesses. Start with an AI Jumpstart and walk away with a real, running AI workflow." />
    <title>Arturo Solo LLC | AI Build Studio for Small Business</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Hidden form for Netlify Forms detection -->
    <form name="contact" method="POST" action="/success" data-netlify="true" data-netlify-honeypot="bot-field" style="display: none;">
      <input type="hidden" name="form-name" value="contact" />
      <input type="hidden" name="subject" value="New Contact Request" />
      <p class="hidden">
        <label>Don't fill this out: <input name="bot-field" /></label>
      </p>
      <input name="name" type="text" required />
      <input name="email" type="email" required />
      <input name="company" type="text" required />
      <select name="service">
        <option value="">What are you interested in?</option>
        <option value="ai-jumpstart">AI Jumpstart</option>
        <option value="custom-ai-build">Custom AI build / implementation</option>
        <option value="not-sure">Not sure yet — let's talk</option>
      </select>
      <textarea name="message"></textarea>
    </form>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
