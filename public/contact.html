<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>
</head>
<body>
    <!-- This form is hidden and only used for Netlify Forms detection -->
    <form name="contact" method="POST" action="/success" data-netlify="true" data-netlify-honeypot="bot-field" style="display: none;">
        <input type="hidden" name="form-name" value="contact" />
        <input type="hidden" name="subject" value="New Contact Request" />
        <p class="hidden">
            <label>Don't fill this out: <input name="bot-field" /></label>
        </p>
        <input name="name" type="text" required />
        <input name="email" type="email" required />
        <input name="company" type="text" required />
        <select name="service">
            <option value="">Select a service</option>
            <option value="microsoft365">Microsoft 365 Optimization</option>
            <option value="googleWorkplace">Google Workplace Management</option>
            <option value="license">License Optimization</option>
            <option value="migration">Cloud Migration</option>
        </select>
        <textarea name="message"></textarea>
    </form>
</body>
</html>
